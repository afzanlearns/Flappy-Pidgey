<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#7ec8e3" />
<title>Flappy Pidgey — Catch 'em all</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  :root {
    --font: 'Press Start 2P', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-touch-callout:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#7ec8e3; font-family:var(--font); }
  #game-canvas { display:block; touch-action:none; }

  .hidden { display:none !important; }

  #watermark {
    position:fixed; left:50%; bottom:5px;
    transform:translateX(-50%);
    font:11px/1 Arial,sans-serif;
    color:#fff; opacity:0.55;
    letter-spacing:1px;
    pointer-events:none;
    z-index:40;
    text-shadow:0 1px 3px rgba(0,0,0,0.5);
  }

  /* ─── Shared overlay panel styling ─────────────────────────────────── */
  .overlay {
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:50;
    padding:20px;
  }
  .panel {
    background:#fff;
    border:4px solid #2d2d3a;
    border-radius:16px;
    box-shadow:0 8px 0 rgba(0,0,0,0.2);
    padding:28px 24px;
    max-width:380px;
    width:100%;
    text-align:center;
  }

  /* ─── Menu Screen ───────────────────────────────────────────────────── */
  #menu-screen { background:rgba(126,200,227,0.0); pointer-events:none; }
  #menu-screen .panel { pointer-events:all; }
  .game-title {
    font-size:22px; color:#ffcc33; text-shadow:3px 3px 0 #cc6622, -1px -1px 0 #fff5cc;
    letter-spacing:1px; line-height:1.5; margin-bottom:6px;
  }
  .game-subtitle {
    font-size:9px; color:#5a4a3a; margin-bottom:20px; letter-spacing:1px;
  }
  .pidgey-icon-row { display:flex; justify-content:center; margin-bottom:20px; }
  .big-btn {
    font-family:var(--font);
    font-size:13px;
    padding:16px 32px;
    border-radius:12px;
    border:none;
    background:#ff4444;
    color:#fff;
    box-shadow:0 5px 0 #cc2222;
    cursor:pointer;
    width:100%;
    margin-bottom:10px;
    letter-spacing:1px;
    transition:transform 0.05s;
  }
  .big-btn:active { transform:translateY(4px); box-shadow:0 1px 0 #cc2222; }
  .secondary-btn {
    font-family:var(--font);
    font-size:9px;
    padding:10px 20px;
    border-radius:10px;
    border:2px solid #2d2d3a;
    background:#f0f0f0;
    color:#2d2d3a;
    cursor:pointer;
    width:100%;
    box-shadow:0 3px 0 #999;
  }
  .secondary-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #999; }
  .menu-stats {
    font-size:8px; color:#777; margin-top:14px; line-height:1.8;
  }
  .menu-controls-hint {
    font-size:7px; color:#999; margin-top:16px; line-height:1.6;
  }

  /* ─── HUD (in-run) ──────────────────────────────────────────────────── */
  #hud {
    position:fixed; top:0; left:0; right:0;
    padding:16px;
    display:flex; justify-content:space-between; align-items:flex-start;
    z-index:30; pointer-events:none;
  }
  #score-display {
    font-size:42px; color:#fff;
    text-shadow:3px 3px 0 rgba(0,0,0,0.3), -1px -1px 0 rgba(0,0,0,0.3);
    line-height:1;
  }
  .hud-dex-pill {
    background:rgba(255,255,255,0.85);
    border-radius:20px;
    padding:8px 14px;
    font-size:8px;
    color:#2d2d3a;
    box-shadow:0 2px 0 rgba(0,0,0,0.15);
  }

  /* ─── Encounter Modal ───────────────────────────────────────────────── */
  #encounter-modal .panel { animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popIn { from { transform:scale(0.7); opacity:0; } to { transform:scale(1); opacity:1; } }

  #encounter-sprite, #result-sprite {
    display:flex; justify-content:center; align-items:center;
    height:160px;
    position:relative;
  }
  #encounter-sprite canvas, #result-sprite canvas {
    image-rendering:pixelated;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,0.25));
    animation: bobIdle 1.6s ease-in-out infinite;
  }
  @keyframes bobIdle { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }

  .shiny-badge {
    position:absolute; top:0; right:50%; margin-right:-90px;
    background:linear-gradient(135deg, #ffd700, #ff9d00);
    color:#fff; font-size:8px; padding:6px 10px; border-radius:8px;
    box-shadow:0 2px 0 #cc7700;
    animation: shinyPulse 1s ease-in-out infinite;
  }
  @keyframes shinyPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }

  #encounter-name { font-size:12px; color:#2d2d3a; margin:14px 0 10px; line-height:1.6; }
  .type-badge {
    display:inline-block; color:#fff; font-size:7px; padding:5px 10px;
    border-radius:8px; margin:0 3px; text-shadow:1px 1px 0 rgba(0,0,0,0.2);
  }

  /* ─── Throw prompt (in-canvas overlay) ──────────────────────────────── */
  #throw-prompt {
    position:fixed; bottom:60px; left:0; right:0;
    text-align:center; z-index:40; pointer-events:none;
  }
  #throw-prompt .prompt-text {
    display:inline-block;
    background:rgba(0,0,0,0.6); color:#fff; font-size:10px;
    padding:10px 18px; border-radius:10px;
    animation: promptPulse 0.8s ease-in-out infinite;
  }
  @keyframes promptPulse { 0%,100% { opacity:0.7; } 50% { opacity:1; } }

  /* ─── Result Modal ──────────────────────────────────────────────────── */
  #result-modal.result-success .panel { border-color:#4ade80; }
  #result-modal.result-fail .panel { border-color:#f87171; }
  #result-title { font-size:11px; line-height:1.6; margin:14px 0 6px; }
  #result-sub { font-size:8px; color:#666; margin-bottom:14px; line-height:1.6; }
  #result-dex-progress { font-size:8px; color:#999; margin-bottom:16px; }

  /* ─── Game Over Screen ──────────────────────────────────────────────── */
  #gameover-screen .panel { animation: popIn 0.3s ease-out; }
  .gameover-title { font-size:16px; color:#ff4444; margin-bottom:18px; letter-spacing:1px; }
  .stat-row {
    display:flex; justify-content:space-between; align-items:center;
    font-size:9px; color:#2d2d3a; padding:10px 4px;
    border-bottom:2px dashed #ddd;
  }
  .stat-row:last-of-type { border-bottom:none; margin-bottom:18px; }
  .stat-label { color:#888; }
  .stat-value { color:#2d2d3a; font-size:11px; }
  .stat-value.gold { color:#e0a020; }

  /* ─── Pokédex Modal ─────────────────────────────────────────────────── */
  #dex-modal { z-index:60; background:rgba(20,20,35,0.85); }
  #dex-modal .panel {
    max-width:480px; max-height:85vh; display:flex; flex-direction:column;
    padding:20px 16px;
  }
  .dex-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .dex-title { font-size:13px; color:#2d2d3a; }
  .dex-close-btn {
    font-family:var(--font); font-size:14px; background:none; border:none;
    cursor:pointer; color:#999; padding:4px 8px;
  }
  .dex-progress-row {
    display:flex; justify-content:space-between; font-size:8px; color:#777;
    margin-bottom:14px;
  }
  .dex-grid-scroll {
    overflow-y:auto; flex:1;
    -webkit-overflow-scrolling:touch;
  }
  #dex-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(76px, 1fr));
    gap:8px;
  }
  .dex-cell {
    background:#f4f4f4;
    border-radius:10px;
    padding:8px 4px;
    display:flex; flex-direction:column; align-items:center;
    border:2px solid #e0e0e0;
  }
  .dex-cell.caught { background:#eafbf0; border-color:#4ade80; }
  .dex-cell.shiny { background:linear-gradient(160deg, #fff7e0, #ffe9b3); border-color:#ffb800; }
  .dex-cell canvas { image-rendering:pixelated; width:40px; height:40px; }

  /* Sprite loading and shiny overlay */
  @keyframes spin { to { transform:rotate(360deg); } }
  .sprite-loading { animation:bobIdle 1.6s ease-in-out infinite; }
  #encounter-sprite img, #result-sprite img { animation:bobIdle 1.6s ease-in-out infinite; image-rendering:pixelated; }
  .shiny-sparkle-overlay { position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse at 70% 20%, rgba(255,220,50,0.55) 0%, transparent 60%), radial-gradient(ellipse at 30% 75%, rgba(255,180,255,0.35) 0%, transparent 50%); border-radius:50%; animation:shinyAura 2s ease-in-out infinite alternate; }
  @keyframes shinyAura { from { opacity:0.5; transform:scale(0.95); } to { opacity:1; transform:scale(1.05); } }
  .dex-cell-sprite { width:48px; height:48px; display:flex; align-items:center; justify-content:center; }
  .dex-cell-sprite img { image-rendering:pixelated; width:48px; height:48px; }
  .dex-unknown {
    width:40px; height:40px; display:flex; align-items:center; justify-content:center;
    font-size:16px; color:#bbb;
  }
  .dex-cell-label { font-size:6px; color:#666; margin-top:4px; text-align:center; line-height:1.3; }
  .dex-cell.caught .dex-cell-label { color:#2d2d3a; }

  /* Lock overlay on uncaught dex cells */
  .dex-sprite-wrap { position:relative; width:48px; height:48px; display:flex; align-items:center; justify-content:center; }
  .dex-sprite-wrap img { image-rendering:pixelated; width:48px; height:48px; }
  .dex-lock-overlay {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.45); border-radius:8px; font-size:20px; color:#fff;
    pointer-events:none;
  }

  /* Detail panel within dex modal */
  #dex-detail {
    position:absolute; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    background:rgba(20,20,35,0.7);
    border-radius:16px;
  }
  #dex-detail.hidden { display:none !important; }
  .dex-detail-card {
    background:#fff; border-radius:14px; padding:24px 20px;
    text-align:center; max-width:240px; width:100%;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
  }
  .dex-detail-card .dex-detail-sprite { height:120px; display:flex; align-items:center; justify-content:center; }
  .dex-detail-card .dex-detail-sprite img { image-rendering:pixelated; width:120px !important; height:120px !important; }
  .dex-detail-name { font-size:12px; color:#2d2d3a; margin:10px 0 6px; line-height:1.5; }
  .dex-detail-status { font-size:9px; color:#999; margin-top:12px; line-height:1.5; }
  .dex-detail-status.found { color:#4ade80; }
  .dex-detail-status.locked { color:#f87171; }
  .dex-detail-shiny-btn {
    margin-top:10px; font-family:var(--font); font-size:8px; padding:6px 14px;
    border-radius:8px; border:2px solid #ffb800; background:#fff7e0; color:#b87a00; cursor:pointer;
  }
  .dex-detail-shiny-btn:active { transform:translateY(2px); }
  .dex-detail-shiny-btn.active { background:#fff0c0; border-color:#ff9d00; color:#8a5e00; }
  .dex-detail-close {
    margin-top:10px; font-family:var(--font); font-size:9px; padding:8px 20px;
    border-radius:8px; border:2px solid #2d2d3a; background:#f0f0f0; color:#2d2d3a; cursor:pointer;
  }
  .dex-detail-close:active { transform:translateY(2px); }

  /* Responsive tightening for very small phones */
  @media (max-width:360px) {
    .panel { padding:20px 16px; }
    .game-title { font-size:18px; }
    #score-display { font-size:34px; }
  }
</style>
</head>
<body>

  <canvas id="game-canvas"></canvas>

  <!-- ─── HUD ─────────────────────────────────────────────────────────── -->
  <div id="hud" class="hidden">
    <div id="score-display">0</div>
    <button id="pause-button" class="hidden" style="font-family:var(--font);background:rgba(0,0,0,0.35);color:#fff;font-size:16px;padding:6px 14px;border:none;border-radius:20px;cursor:pointer;z-index:32;pointer-events:all;line-height:1;">⏸</button>
    <div class="hud-dex-pill"><svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle;margin-right:4px;"><circle cx="8" cy="8" r="7" fill="#f0f0f0" stroke="#222" stroke-width="1.2"/><path d="M1 8 A7 7 0 0 1 15 8" fill="#ee1515"/><rect x="1" y="7.3" width="14" height="1.4" fill="#222"/><circle cx="8" cy="8" r="2.2" fill="#eee" stroke="#666" stroke-width="0.8"/></svg> <span id="hud-dex-progress">0/151</span></div>
  </div>

  <!-- ─── Menu Screen ─────────────────────────────────────────────────── -->
  <div id="menu-screen" class="overlay">
    <div class="panel">
      <div class="game-title">FLAPPY<br/>PIDGEY</div>
      <div class="game-subtitle">CATCH 'EM ALL EDITION</div>
      <button id="play-button" class="big-btn">▶ PLAY</button>
      <button id="dex-button" class="secondary-btn">📕 POKÉDEX</button>
      <div class="menu-controls-hint">TAP OR PRESS SPACE TO FLAP</div>
    </div>
  </div>

  <!-- ─── Encounter Modal ─────────────────────────────────────────────── -->
  <div id="encounter-modal" class="overlay hidden">
    <div class="panel">
      <div style="position:relative;">
        <div id="encounter-sprite"></div>
        <div id="shiny-badge" class="shiny-badge hidden">✨ SHINY!</div>
      </div>
      <div id="encounter-name"></div>
      <div id="encounter-types"></div>
      <button id="throw-button" class="big-btn" style="margin-top:18px;"><svg width="20" height="20" viewBox="0 0 20 20" style="vertical-align:middle;margin-right:8px;"><circle cx="10" cy="10" r="9" fill="white" stroke="black" stroke-width="1.5"/><path d="M1 10 A9 9 0 0 1 19 10 Z" fill="#FF1744"/><line x1="1" y1="10" x2="19" y2="10" stroke="black" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="white" stroke="black" stroke-width="1.5"/></svg> THROW POKÉ BALL</button>
    </div>
  </div>

  <!-- ─── Throw Prompt (overlays canvas during throw minigame) ─────────── -->
  <div id="throw-prompt" class="hidden">
    <div class="prompt-text">TAP WHEN THE RING IS SMALL!</div>
  </div>

  <!-- ─── Result Modal ────────────────────────────────────────────────── -->
  <div id="result-modal" class="overlay hidden">
    <div class="panel">
      <div id="result-sprite" style="position:relative;display:flex;justify-content:center;align-items:center;height:160px;"></div>
      <div id="result-title"></div>
      <div id="result-sub"></div>
      <div id="result-dex-progress"></div>
      <button id="result-continue" class="big-btn">CONTINUE FLYING ▶</button>
    </div>
  </div>

  <!-- ─── Game Over Screen ────────────────────────────────────────────── -->
  <div id="gameover-screen" class="overlay hidden">
    <div class="panel">
      <div class="gameover-title">GAME OVER</div>
      <div class="stat-row"><span class="stat-label">SCORE</span><span class="stat-value" id="final-score">0</span></div>
      <div class="stat-row"><span class="stat-label">BEST</span><span class="stat-value gold" id="final-best">0</span></div>
      <div class="stat-row"><span class="stat-label">POKÉDEX</span><span class="stat-value" id="final-dex">0 / 151</span></div>
      <button id="retry-button" class="big-btn">↻ TRY AGAIN</button>
      <button id="share-button" class="secondary-btn">📤 SHARE SCORE</button>
      <button id="gameover-dex-button" class="secondary-btn">📕 VIEW POKÉDEX</button>
    </div>
  </div>

  <!-- ─── Pause Screen ────────────────────────────────────────────────── -->
  <div id="pause-screen" class="overlay hidden" style="background:rgba(0,0,0,0.55);">
    <div class="panel" style="background:rgba(30,35,55,0.95);border-color:#555;">
      <div style="font-size:28px;color:#fff;margin-bottom:24px;text-shadow:2px 2px 0 rgba(0,0,0,0.3);font-family:var(--font);">PAUSED</div>
      <button id="resume-button" class="big-btn">▶ RESUME</button>
      <button id="quit-button" class="secondary-btn" style="color:#ccc;border-color:#666;background:rgba(255,255,255,0.08);">🏠 QUIT TO MENU</button>
    </div>
  </div>

  <!-- ─── Pokédex Modal ───────────────────────────────────────────────── -->
  <div id="dex-modal" class="overlay hidden">
    <div class="panel">
      <div class="dex-header">
        <div class="dex-title">POKÉDEX</div>
        <button id="dex-close" class="dex-close-btn">✕</button>
      </div>
      <div class="dex-progress-row">
        <span id="dex-progress-text">0 / 151 caught</span>
        <span id="dex-shiny-text">✨ 0 shiny catches</span>
      </div>
      <div class="dex-grid-scroll">
        <div id="dex-grid"></div>
      </div>
      <div id="dex-detail" class="hidden">
        <div class="dex-detail-card">
          <div class="dex-detail-sprite" id="dex-detail-sprite"></div>
          <div class="dex-detail-name" id="dex-detail-name"></div>
          <div id="dex-detail-types"></div>
          <div class="dex-detail-status" id="dex-detail-status"></div>
          <button class="dex-detail-shiny-btn" id="dex-detail-shiny">✨ Show shiny</button>
          <button class="dex-detail-close" id="dex-detail-close">BACK</button>
        </div>
      </div>
    </div>
  </div>

  <div id="watermark">madebyafzan</div>

  <script src="js/pokedex-data.js"></script>
  <script src="js/sprite-forge.js"></script>
  <script src="js/save-data.js"></script>
  <script src="js/game.js"></script>
  <script>
    const canvas = document.getElementById("game-canvas");
    const game = new Game(canvas);
  </script>
</body>
</html>
